# CI/CD: push в main → деплой на VPS по SSH
#
# Секреты в GitHub: Settings → Secrets → Actions
#   VPS_HOST      — IP или домен сервера
#   VPS_USER      — например root или deploy
#   VPS_SSH_KEY   — приватный SSH-ключ (полностью, с BEGIN/END)
#   VPS_APP_PATH  — /opt/svjezhij-urozhaj
#   VPS_PORT      — (опционально) 22 по умолчанию

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"
            test -f .env || { echo "Нет .env на сервере — создайте вручную один раз"; exit 1; }
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.vps.yml up -d --build
            docker image prune -f
